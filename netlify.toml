[build]
  publish = "apps/web/.next"
  command = "pnpm install && pnpm --filter @propoai/database build && pnpm --filter @propoai/web build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  included_files = ["packages/database/prisma/schema.prisma", "packages/database/dist/**"]

[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200
