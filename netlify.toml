[build]
  base = "apps/web"
  publish = ".next"
  command = "pnpm install && pnpm --filter @propoai/database build && pnpm build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200
